<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Teal rounded background -->
  <rect width="512" height="512" rx="115" fill="#00B0B9"/>

  <!-- Fork: 3 tines -->
  <rect x="148" y="120" width="14" height="90" rx="7" fill="white"/>
  <rect x="173" y="120" width="14" height="90" rx="7" fill="white"/>
  <rect x="198" y="120" width="14" height="90" rx="7" fill="white"/>
  <!-- Fork horizontal bar -->
  <rect x="148" y="206" width="64" height="14" rx="7" fill="white"/>
  <!-- Fork handle -->
  <rect x="173" y="206" width="14" height="186" rx="7" fill="white"/>

  <!-- Leaf: vertical oval slightly tilted -->
  <ellipse cx="328" cy="256" rx="62" ry="130" transform="rotate(-5 328 256)" fill="white"/>
  <!-- Leaf vein -->
  <line x1="328" y1="126" x2="328" y2="386"
        stroke="#00B0B9" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
</svg>
